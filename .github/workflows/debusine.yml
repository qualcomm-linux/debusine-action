name: Debusine CI

on:
  workflow_call:
    inputs:
      target_branch:
        description: Where the packaging will land (or for dailies, has landed)
        type: string
        required: true
      source_ref:
        description: What packaging to test. Defaults to using github.ref.
        type: string
        required: false
      release:
        description: Run release step
        type: boolean
        required: true
        default: true
      debusine-action-ref:
        description: Ref of qualcomm-linux/debusine-action to check out for helper scripts
        type: string
        required: false
        default: main
      debusine-parent-workspace:
        description: Parent Debusine workspace used to create per-run CI child workspaces
        type: string
        required: false
      job_index:
        # This is used to generate a unique Debusine child workspace name for
        # each expansion of the matrix
        description: Uniquely identifying index for matrix strategies
        type: string
        required: false
        default: "0"
    secrets:
      DEBUSINE_USER:
        required: true
      DEBUSINE_TOKEN:
        required: true
      DEBUSINE_RELEASE_TOKEN:
        required: true

# Release runs for the same branch share a group (preventing concurrent
# releases), while non-release runs get unique groups (allowing concurrent
# execution)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.target_branch }}-${{ inputs.release && 'release' || github.run_id }}

jobs:
  resolve:
    name: Resolve shared inputs
    runs-on: ubuntu-latest
    # The source-package, Debusine build, and release jobs all consume these.
    outputs:
      suite: ${{ steps.map_suite.outputs.suite }}
      source_ref: ${{ steps.determine_checkout_ref.outputs.source_ref }}
      debusine_action_ref: ${{ inputs.debusine-action-ref }}
    steps:
      - id: map_suite
        name: Map branch to suite
        uses: actions/github-script@v9
        env:
          TARGET_BRANCH: ${{ inputs.target_branch }}
        with:
          script: |
            const suiteMap = {
              "qcom/debian/latest": "forky",
              "qcom/debian/trixie": "trixie",
            };

            const targetBranch = process.env.TARGET_BRANCH;
            const suite = suiteMap[targetBranch];

            if (!suite) {
              core.setFailed(`Unknown target branch: ${targetBranch}. Valid branches are: ${Object.keys(suiteMap).join(', ')}`);
              return;
            }

            core.setOutput('suite', suite);
            core.info(`Mapped branch '${targetBranch}' to suite '${suite}'`);
      - id: determine_checkout_ref
        name: Determine the ref of the packaging to build
        uses: actions/github-script@v9
        env:
          SOURCE_REF: ${{ inputs.source_ref }}
        with:
          script: |
            const sourceRef = process.env.SOURCE_REF;
            let ref;
            if (sourceRef) {
              // Explicit override from caller (e.g. schedule + matrix)
              ref = sourceRef;
            } else if (context.eventName === 'pull_request') {
              // PR: use head SHA, not refs/pull/*/merge
              ref = context.payload.pull_request.head.sha;
            } else {
              // push / workflow_dispatch / schedule default
              ref = context.ref;
            }
            core.setOutput('source_ref', ref);
            core.info(`Using source_ref '${ref}'`);

  source-package:
    name: Prepare source package
    needs: resolve
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/qualcomm-linux/debusine-pkg-builder:${{ needs.resolve.outputs.suite == 'unstable' && 'sid' || needs.resolve.outputs.suite }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --user root
    permissions:
      contents: read
      packages: read
    outputs:
      srcpkg_name: ${{ steps.generate-source-package.outputs.srcpkg_name }}
      srcpkg_version: ${{ steps.generate-source-package.outputs.srcpkg_version }}
    steps:
      - uses: actions/checkout@v6
        with:
          # Using the parent directory for Debian build artifacts is problematic, for example breaking actions/upload-artifact:
          # https://github.com/actions/upload-artifact/issues/176
          path: srcpkg
          ref: ${{ needs.resolve.outputs.source_ref }}
      - uses: actions/checkout@v6
        with:
          repository: qualcomm-linux/debusine-action
          ref: ${{ needs.resolve.outputs.debusine_action_ref }}
          path: debusine-action
      - name: Prepare release
        if: ${{ inputs.release }}
        env:
          SUITE: ${{ needs.resolve.outputs.suite }}
        run: |
          set -ex
          debusine-action/lib/prepare-release
      - id: generate-source-package
        name: Generate source package
        env:
          SUITE: ${{ needs.resolve.outputs.suite }}
        run: |
          set -ex
          debusine-action/lib/generate-source-package

      - name: Stage source package files
        env:
          CHANGES_PATH: ${{ steps.generate-source-package.outputs.changes_path }}
        run: |
          set -eux
          mkdir source-package
          dcmd cp "$CHANGES_PATH" source-package/

      - name: Upload source package files
        uses: actions/upload-artifact@v7
        with:
          name: source-package
          path: source-package
          if-no-files-found: error

      - name: Upload release bundle
        if: ${{ inputs.release }}
        uses: actions/upload-artifact@v7
        with:
          name: release-bundle
          path: release.bundle
          if-no-files-found: error

  build:
    name: Build in Debusine
    needs: [resolve, source-package]
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/qualcomm-linux/debusine-pkg-builder:trixie
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --user root
    permissions:
      contents: read
      packages: read
    outputs:
      workspace: ${{ steps.build.outputs.workspace }}
    steps:
      - uses: actions/checkout@v6
        with:
          repository: qualcomm-linux/debusine-action
          ref: ${{ needs.resolve.outputs.debusine_action_ref }}
          path: debusine-action

      - name: Download source package files
        uses: actions/download-artifact@v8
        with:
          name: source-package
          path: source-package

      - name: Restore source package files to workspace root
        run: |
          set -eux
          find source-package -maxdepth 1 -type f -exec mv -t . {} +
          rmdir source-package

      - id: build
        name: Build in Debusine
        env:
          SUITE: ${{ needs.resolve.outputs.suite }}
          GITHUB_REPOSITORY_ID: ${{ github.repository_id }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
          JOB_INDEX: ${{ inputs.job_index }}
          DEBUSINE_HOST: ${{ vars.DEBUSINE_HOST }}
          DEBUSINE_SCOPE: ${{ vars.DEBUSINE_SCOPE }}
          DEBUSINE_TOKEN: ${{ secrets.DEBUSINE_TOKEN }}
          DEBUSINE_PARENT_WORKSPACE: ${{ inputs.debusine-parent-workspace }}
        run: |
          set -ex
          debusine-action/lib/build
          cat output >> "$GITHUB_OUTPUT"

      - name: Generate summary
        env:
          DEBUSINE_HOST: ${{ vars.DEBUSINE_HOST }}
          DEBUSINE_SCOPE: ${{ vars.DEBUSINE_SCOPE }}
          DEBUSINE_USER: ${{ secrets.DEBUSINE_USER }}
          DEBUSINE_TOKEN: ${{ secrets.DEBUSINE_TOKEN }}
          DEBUSINE_WORKSPACE: ${{ steps.build.outputs.workspace }}
          SRCPKG_NAME: ${{ needs.source-package.outputs.srcpkg_name }}
          SRCPKG_VERSION: ${{ needs.source-package.outputs.srcpkg_version }}
          SUITE: ${{ needs.resolve.outputs.suite }}
        run: |
          debusine-action/lib/generate-step-summary

  release:
    name: Release
    if: ${{ inputs.release }}
    needs: [resolve, source-package, build]
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/qualcomm-linux/debusine-pkg-builder:trixie
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --user root
    environment: Production
    permissions:
      contents: write
      deployments: write
      packages: read
    steps:
      - uses: actions/checkout@v6
        with:
          # Using the parent directory for Debian build artifacts is problematic, for example breaking actions/upload-artifact:
          # https://github.com/actions/upload-artifact/issues/176
          path: srcpkg
          ref: ${{ needs.resolve.outputs.source_ref }}
      - uses: actions/checkout@v6
        with:
          repository: qualcomm-linux/debusine-action
          ref: ${{ needs.resolve.outputs.debusine_action_ref }}
          path: debusine-action
      - name: Download release bundle
        uses: actions/download-artifact@v8
        with:
          name: release-bundle
          path: .
      - name: Release
        env:
          DEBUSINE_HOST: ${{ vars.DEBUSINE_HOST }}
          DEBUSINE_SCOPE: ${{ vars.DEBUSINE_SCOPE}}
          DEBUSINE_TOKEN: ${{ secrets.DEBUSINE_RELEASE_TOKEN }}
          DEBUSINE_CI_WORKSPACE: ${{ needs.build.outputs.workspace }}
          SRCPKG_NAME: ${{ needs.source-package.outputs.srcpkg_name }}
          SRCPKG_VERSION: ${{ needs.source-package.outputs.srcpkg_version}}
          SUITE: ${{ needs.resolve.outputs.suite }}
        run: |
          set -ex
          debusine-action/lib/release
          debusine-action/lib/push-release
