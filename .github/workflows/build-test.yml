name: Build Debian Package

on:
  push:
    branches: [ main ]
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [ main ]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    container:
      image: debian:trixie
      options: --user root
    steps:
      - name: Install git
        run: |
          set -euo pipefail
          apt-get update
          apt-get install -y git jq yq

      - name: Checkout repository
        uses: actions/checkout@v6
